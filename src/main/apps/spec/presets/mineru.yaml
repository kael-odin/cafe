# MinerU - PDF/DOCX Document Parser
# App Spec for Cafe-AI MCP Integration

spec_version: "1"
type: mcp

name: MinerU
version: "1.0.0"
author: Cafe-AI Team
description: |
  Convert PDF and DOCX attachments to Markdown so AI can read them reliably.
  Remote MinerU service is the default path for the desktop app.

icon: document-text

mcp_server:
  transport: stdio
  command: mineru-mcp
  args: []
  env:
    MINERU_API_URL: "https://mineru.net"

config_schema:
  - key: mode
    label: Service Mode
    type: select
    description: Use the hosted MinerU service by default, or switch to a self-hosted endpoint.
    required: true
    default: remote
    options:
      - label: Remote (Recommended)
        value: remote
      - label: Local / Self-hosted
        value: local

  - key: remote_url
    label: Remote API URL
    type: url
    description: Remote MinerU API endpoint used for PDF/DOCX parsing.
    required: false
    default: "https://mineru.net"
    placeholder: "https://mineru.net"

  - key: port
    label: Local Service Port
    type: number
    description: Port for a self-hosted MinerU service when local mode is selected.
    required: false
    default: 18000
    placeholder: "18000"

  - key: backend
    label: Parsing Backend
    type: select
    description: |
      Backend for PDF/DOCX to Markdown conversion:
      - hybrid-auto-engine: High accuracy, multi-language (recommended)
      - pipeline: General purpose, hallucination-free
      - vlm-auto-engine: High accuracy, Chinese/English only
    required: true
    default: hybrid-auto-engine
    options:
      - label: Hybrid Auto Engine (Recommended)
        value: hybrid-auto-engine
      - label: Pipeline (General Purpose)
        value: pipeline
      - label: VLM Auto Engine (Chinese/English)
        value: vlm-auto-engine

  - key: default_lang
    label: Default Language
    type: select
    description: Default language hint for document parsing.
    required: true
    default: ch
    options:
      - label: Chinese/English
        value: ch
      - label: English
        value: en
      - label: Korean
        value: korean
      - label: Japanese
        value: japan

  - key: formula_enable
    label: Enable Formula Parsing
    type: boolean
    description: Convert mathematical formulas to LaTeX when available.
    required: false
    default: true

  - key: table_enable
    label: Enable Table Parsing
    type: boolean
    description: Convert tables to HTML when available.
    required: false
    default: true

  - key: auto_start
    label: Auto-start Local Service
    type: boolean
    description: Only used in local mode to start a self-hosted MinerU service automatically.
    required: false
    default: false

store:
  category: document-processing
  tags:
    - pdf
    - docx
    - document-parsing
    - markdown
  featured: true
  homepage: "https://github.com/opendatalab/MinerU"
  repository: "https://github.com/opendatalab/MinerU"
  license: MIT

