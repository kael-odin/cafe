    description: |
      PDF/DOCX/Image document parsing with Markdown output.
      Supports formula (LaTeX) and table (HTML) extraction.
      Supports both local and remote deployment modes.
    config_schema:
      mode:
        label: Service Mode
        description: Choose between local or remote MinerU service
        options:
          local: Local (Run on this computer)
          remote: Remote (Use remote API)
      remote_url:
        label: Remote API URL
        description: MinerU remote API endpoint (remote mode only)
      port:
        label: Local Service Port
        description: Port for local MinerU service (default: 18000)
      backend:
        label: Parsing Backend
        description: |
          Backend for document parsing:
          - hybrid-auto-engine: High accuracy, multi-language (recommended)
          - pipeline: General purpose, hallucination-free
          - vlm-auto-engine: High accuracy, Chinese/English only
        options:
          hybrid-auto-engine: Hybrid Auto Engine (Recommended)
          pipeline: Pipeline (General Purpose)
          vlm-auto-engine: VLM Auto Engine (Chinese/English)
      default_lang:
        label: Default Language
        description: Default language for document parsing
        options:
          ch: Chinese/English
          en: English
          korean: Korean
          japan: Japanese
      formula_enable:
        label: Enable Formula Parsing
        description: Parse mathematical formulas to LaTeX format
      table_enable:
