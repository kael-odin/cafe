# MinerU - PDF/DOCX Document Parser
# App Spec for Cafe-AI MCP Integration

spec_version: "1"
type: mcp

# App Identity
name: MinerU
version: "1.0.0"
author: Cafe-AI Team
description: |
  PDF/DOCX/Image document parsing with Markdown output.
  Parse complex documents including formulas (LaTeX) and tables (HTML).
  Supports both local and remote deployment modes.

icon: document-text

# MCP Server Configuration
mcp_server:
  transport: stdio
  command: mineru-mcp
  args: []
  env:
    MINERU_API_URL: "http://localhost:18000"

# User Configuration Schema
config_schema:
  - key: mode
    label: Service Mode
    type: select
    description: Choose between local or remote MinerU service
    required: true
    default: local
    options:
      - label: Local (Run on this computer)
        value: local
      - label: Remote (Use remote API)
        value: remote

  - key: remote_url
    label: Remote API URL
    type: url
    description: MinerU remote API endpoint (only for remote mode)
    required: false
    placeholder: "https://api.mineru.net"

  - key: port
    label: Local Service Port
    type: number
    description: Port for local MinerU service (default: 18000)
    required: false
    default: 18000
    placeholder: "18000"

  - key: backend
    label: Parsing Backend
    type: select
    description: |
      Backend for document parsing:
      - hybrid-auto-engine: High accuracy, multi-language (recommended)
      - pipeline: General purpose, hallucination-free
      - vlm-auto-engine: High accuracy, Chinese/English only
    required: true
    default: hybrid-auto-engine
    options:
      - label: Hybrid Auto Engine (Recommended)
        value: hybrid-auto-engine
      - label: Pipeline (General Purpose)
        value: pipeline
      - label: VLM Auto Engine (Chinese/English)
        value: vlm-auto-engine

  - key: default_lang
    label: Default Language
    type: select
    description: Default language for document parsing
    required: true
    default: ch
    options:
      - label: Chinese/English
        value: ch
      - label: English
        value: en
      - label: Korean
        value: korean
      - label: Japanese
        value: japan

  - key: formula_enable
    label: Enable Formula Parsing
    type: boolean
    description: Parse mathematical formulas to LaTeX format
    required: false
    default: true

  - key: table_enable
    label: Enable Table Parsing
    type: boolean
    description: Parse tables to HTML format
    required: false
    default: true

  - key: auto_start
    label: Auto-start Service
    type: boolean
    description: Automatically start local MinerU service when needed
    required: false
    default: true

# Store Metadata
store:
  category: document-processing
  tags:
    - pdf
    - document-parsing
    - ocr
    - markdown
    - formula
    - table
  featured: true
  homepage: "https://github.com/opendatalab/MinerU"
  repository: "https://github.com/opendatalab/MinerU"
  license: MIT

# Internationalization
i18n:
  zh-CN:
    name: MinerU 文档解析
    description: |
      PDF/DOCX/图片文档解析，输出 Markdown 格式。
      支持公式（LaTeX）和表格（HTML）识别。
      支持本地和远程两种部署模式。
    config_schema:
      mode:
        label: 服务模式
        description: 选择本地或远程 MinerU 服务
        options:
          local: 本地（在本机运行）
          remote: 远程（使用远程 API）
      remote_url:
        label: 远程 API 地址
        description: MinerU 远程 API 端点（仅远程模式）
      port:
        label: 本地服务端口
        description: 本地 MinerU 服务端口（默认：18000）
      backend:
        label: 解析后端
        description: |
          文档解析后端：
          - hybrid-auto-engine: 高精度，多语言（推荐）
          - pipeline: 通用型，无幻觉
          - vlm-auto-engine: 高精度，仅中英文
        options:
          hybrid-auto-engine: 混合自动引擎（推荐）
          pipeline: 管道模式（通用）
          vlm-auto-engine: VLM 自动引擎（中英文）
      default_lang:
        label: 默认语言
        description: 文档解析的默认语言
        options:
          ch: 中文/英文
          en: 英文
          korean: 韩文
          japan: 日文
      formula_enable:
        label: 启用公式解析
        description: 将数学公式解析为 LaTeX 格式
      table_enable:
        label: 启用表格解析
        description: 将表格解析为 HTML 格式
      auto_start:
        label: 自动启动服务
        description: 需要时自动启动本地 MinerU 服务

  en-US:
